servers:
  - name: filesystem
    command: ["npx", "-y", "@modelcontextprotocol/server-filesystem", "/path/to/project"]
  - name: slack
    command: ["npx", "-y", "@modelcontextprotocol/server-slack"]

mode: enforce   # enforce | audit-only

actions:
  dangerous_command: block
  secret_in_args: block
  secret_in_output: redact     # redacted in audit log only; agent still sees raw output (see README)
  taint_leak: block
  prompt_injection_marker: warn  # tripwire only, see README
  path_traversal: warn           # tripwire on inbound args (encoded ../, null bytes, /etc/passwd, etc.)
  sql_injection: warn            # tripwire on inbound args (tautologies, stacked queries, UNION SELECT)

taint:
  sensitive_sources:
    files: [".env", "*secret*", "*credentials*", "id_rsa*"]
    db_tables: ["users", "customers"]
  # Tool names are exposed as "<server>__<tool>" (e.g. "slack__post_message"),
  # so sink patterns should match that form. "*send*"/"*post*" style wildcards
  # work regardless of which server they come from.
  external_sinks:
    tools: ["http__*", "email__*", "slack__*", "*send*", "*post*"]

limits:
  max_scan_bytes: 262144
  max_taint_value_bytes: 512
  max_taint_entries: 1000

kill_switch: false
